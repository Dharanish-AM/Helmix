name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'libs/**'
              - 'services/**'
              - 'go.work'
              - 'go.work.sum'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            e2e:
              - 'tests/e2e/**'
              - 'infra/migrations/**'
              - 'docker-compose.yml'
              - 'scripts/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/dashboard/**'

  go-tests:
    name: Go Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs:
      - changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        module:
          - libs/auth
          - libs/event-sdk
          - services/auth-service
          - services/api-gateway
          - services/repo-analyzer
          - services/infra-generator
          - services/pipeline-generator
          - services/deployment-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test ./...

  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    needs:
      - changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: NODE_ENV=production npm run build

  phase1-e2e-smoke:
    name: Phase 1 E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - changes
      - go-tests
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure local JWT keys
        run: make jwt-keys

      - name: Apply DB migrations
        run: make migrate

      - name: Run Phase 1 E2E smoke
        run: make test-e2e-phase1

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color
