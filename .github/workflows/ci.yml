name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      e2e: ${{ steps.filter.outputs.e2e }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'libs/**'
              - 'services/**'
              - 'go.work'
              - 'go.work.sum'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            e2e:
              - 'tests/e2e/**'
              - 'infra/migrations/**'
              - 'docker-compose.yml'
              - 'scripts/**'
              - 'Makefile'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/dashboard/**'

  go-tests:
    name: Go Tests (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs:
      - changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        module:
          - libs/auth
          - libs/event-sdk
          - services/auth-service
          - services/api-gateway
          - services/repo-analyzer
          - services/infra-generator
          - services/pipeline-generator
          - services/deployment-engine
          - services/observability
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test ./...

  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    needs:
      - changes
    if: github.event_name == 'push' || needs.changes.outputs.frontend == 'true'
    defaults:
      run:
        working-directory: frontend/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: NODE_ENV=production npm run build

  python-tests:
    name: Python Tests (incident-ai)
    runs-on: ubuntu-latest
    needs:
      - changes
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true'
    defaults:
      run:
        working-directory: services/incident-ai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run tests
        run: pytest tests -q

  phase1-e2e-smoke:
    name: Phase 1 E2E Smoke
    runs-on: ubuntu-latest
    needs:
      - changes
      - go-tests
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure local JWT keys
        run: make jwt-keys

      - name: Start dependencies (Postgres) for migrations
        run: |
          docker compose up -d postgres
          docker compose ps
          docker compose logs --no-color postgres || true

      - name: Apply DB migrations
        run: make migrate

      - name: Run Phase 1 E2E smoke
        run: make test-e2e-phase1

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color

  phase3-incident-e2e-smoke:
    name: Phase 3 Incident E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - changes
      - go-tests
      - python-tests
    if: github.event_name == 'push' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.e2e == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark phase3 smoke start
        run: echo "PHASE3_INCIDENT_SMOKE_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Ensure local JWT keys
        run: make jwt-keys

      - name: Start dependencies (Postgres) for migrations
        run: |
          docker compose up -d postgres
          docker compose ps
          docker compose logs --no-color postgres || true

      - name: Apply DB migrations
        run: make migrate

      - name: Refresh incident-ai runtime image
        run: docker compose pull incident-ai

      - name: Run Phase 3 incident E2E smoke
        run: make test-e2e-phase3-incident

      - name: Capture compose state
        if: always()
        run: |
          echo "### Compose Service State" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          docker compose ps >> "$GITHUB_STEP_SUMMARY"

      - name: Record phase3 smoke runtime
        if: always()
        run: |
          end_ts=$(date +%s)
          start_ts=${PHASE3_INCIDENT_SMOKE_START:-$end_ts}
          elapsed=$((end_ts - start_ts))
          mins=$((elapsed / 60))
          secs=$((elapsed % 60))
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Phase 3 Incident Smoke Runtime" >> "$GITHUB_STEP_SUMMARY"
          echo "- Elapsed: ${mins}m ${secs}s (${elapsed}s)" >> "$GITHUB_STEP_SUMMARY"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --no-color
