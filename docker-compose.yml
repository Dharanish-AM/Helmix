services:
  postgres:
    image: postgres:16
    container_name: helmix-postgres
    environment:
      POSTGRES_USER: helmix
      POSTGRES_PASSWORD: helmix
      POSTGRES_DB: helmix
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helmix -d helmix"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: helmix-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  nats:
    image: nats:2.10
    container_name: helmix-nats
    command: ["-c", "/etc/nats/nats.conf"]
    tmpfs:
      - /tmp
    volumes:
      - ./infra/nats/nats.conf:/etc/nats/nats.conf:ro
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nats-server", "-sl", "reload=/tmp/nats.pid"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: helmix-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "printf '' > /dev/tcp/127.0.0.1/6333"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  vault:
    image: hashicorp/vault:1.15
    container_name: helmix-vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres-data:
